name: Build PvZ Decompilation

on:
  push:
    branches: [ master ]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build solution (x86, Debug)
        run: msbuild "PlantsVsZombies.sln" /m /p:Configuration=Debug /p:Platform=x86

      - name: Upload build output
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: pvz-debug
          path: |
            **/*.exe
            **/*.dll
          if-no-files-found: ignore
